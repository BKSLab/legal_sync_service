[loggers]
keys=root,legal_sync_service,httpx,httpcore,sqlalchemy

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_legal_sync_service]
level=INFO
handlers=consoleHandler
qualname=legal_sync_service
propagate=0

[logger_sqlalchemy]
level=WARNING
handlers=consoleHandler
qualname=sqlalchemy
propagate=0

[logger_httpx]
level=WARNING
handlers=consoleHandler
qualname=httpx
propagate=0

[logger_httpcore]
level=WARNING
handlers=consoleHandler
qualname=httpcore
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter

[formatter_simpleFormatter]
format=%(asctime)s [%(levelname)s] %(name)s %(funcName)s %(message)s
